name: RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP Properly
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 1

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          sc config TermService start= auto
          net start TermService

      - name: Create User
        shell: powershell
        run: |
          $pass = "Rdp@123456!"
          $sec = ConvertTo-SecureString $pass -AsPlainText -Force

          net user RDP $pass /add
          net localgroup Administrators RDP /add
          net localgroup "Remote Desktop Users" RDP /add

          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASS=$pass" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-rdp-$env:GITHUB_RUN_ID

          Start-Sleep 15

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Show Login Info
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "IP: $env:TS_IP"
          Write-Host "USERNAME: .\RDP"
          Write-Host "PASSWORD: $env:RDP_PASS"
          Write-Host "=============================="
          Write-Host ""

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Write-Host "$(Get-Date) Running..."
            Start-Sleep 300
          }
